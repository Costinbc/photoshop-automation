<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Templates · Card Maker</title>
  <link rel="stylesheet" href="/web/ui/theme.css" />
  <style>
    /* Gallery-specific styling. Shared tokens/primitives live in theme.css. */
    header { margin: 8px 0 14px; }
    h1 { font-size: 20px; margin: 0; font-weight: 700; }
    .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .tpl { display: flex; flex-direction: column; background: var(--panel);
           border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
    /* 4:5 card aspect (the templates are portrait 1080×1350). Placeholder until
       a real thumbnail exists (the prep tool will generate them). */
    .tpl-thumb { aspect-ratio: 4 / 5; background: var(--panel-2); display: flex;
                 align-items: center; justify-content: center; color: var(--muted);
                 font-size: 30px; }
    .tpl-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .tpl-body { padding: 10px 12px 12px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .tpl-label { font-weight: 600; font-size: 15px; }
    .tpl-cat { color: var(--muted); font-size: 12px; }
    .tpl-use { margin-top: auto; text-align: center; text-decoration: none;
               background: var(--accent); color: var(--accent-ink); border-radius: 10px;
               padding: 10px; font-weight: 600; font-size: 14px; }
    .empty { color: var(--muted); font-size: 14px; padding: 24px 0; text-align: center; }
  </style>
</head>
<body>
  <nav id="nav"></nav>
  <div class="wrap">
    <header>
      <h1>Templates</h1>
      <div class="sub">Pick one to start a post.</div>
    </header>
    <div class="grid" id="grid"></div>
  </div>

  <script type="module" src="/web/templates.js"></script>
</body>
</html>
