<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Create a post - Card Maker</title>
  <link rel="stylesheet" href="/web/ui/theme.css" />
  <style>
    /* Card-maker-specific styling. Shared tokens/primitives live in theme.css. */
    header { display: flex; align-items: baseline; justify-content: space-between; margin: 4px 0 14px; }
    h1 { font-size: 18px; margin: 0; font-weight: 600; }
    /* Status lives next to the Generate button so it's visible right where the
       user acts — "Loading fonts", "Placing image", errors, cancel confirmation. */
    .status-bar { display: flex; align-items: center; gap: 10px; margin-top: 10px;
                  min-height: 20px; font-size: 13px; color: var(--muted); }
    .status-bar .status-text { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .status-bar.status-error { color: #ff8080; }
    .status-bar .retry-btn { background: var(--panel-2); color: var(--text); border: 1px solid var(--line);
                             border-radius: 8px; padding: 4px 12px; font: inherit; font-size: 12px; cursor: pointer; }
    button.primary.cancel { background: transparent; color: var(--text); border: 1px solid var(--line); }
    .row { display: flex; align-items: center; gap: 12px; }
    input[type=range] { flex: 1; accent-color: var(--accent); }
    .pill { font-variant-numeric: tabular-nums; font-size: 13px; color: var(--text); background: var(--panel-2);
            border: 1px solid var(--line); border-radius: 999px; padding: 3px 10px; white-space: nowrap; }
    .seg { display: inline-flex; flex-wrap: wrap; background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
    .seg button { background: transparent; color: var(--muted); border: 0; padding: 8px 16px; font: inherit; cursor: pointer; }
    .seg button[aria-pressed=true] { background: var(--accent); color: var(--accent-ink); font-weight: 600; }
    input[type=file] { width: 100%; font-size: 13px; color: var(--muted); }
    .nudge { display: flex; align-items: center; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .nudge-label { font-size: 12px; color: var(--muted); margin-right: 2px; }
    .nudge-btn { background: var(--panel-2); color: var(--text); border: 1px solid var(--line);
                 border-radius: 8px; padding: 6px 11px; font: inherit; font-size: 13px; line-height: 1; cursor: pointer;
                 display: inline-flex; align-items: center; justify-content: center; min-width: 34px; min-height: 28px; }
    .nudge-btn:active { transform: scale(0.94); }
    .nudge-input { width: 52px; background: var(--panel-2); color: var(--text); border: 1px solid var(--line);
                   border-radius: 8px; padding: 6px 6px; font: inherit; font-size: 13px; text-align: center;
                   -moz-appearance: textfield; }
    .nudge-input::-webkit-inner-spin-button, .nudge-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .nudge-input-zoom { width: 48px; }
    /* Direction arrows drawn in CSS (no glyphs). */
    .tri { display: inline-block; width: 0; height: 0; }
    .tri-left { border-top: 5px solid transparent; border-bottom: 5px solid transparent; border-right: 7px solid currentColor; }
    .tri-right { border-top: 5px solid transparent; border-bottom: 5px solid transparent; border-left: 7px solid currentColor; }
    .tri-up { border-left: 5px solid transparent; border-right: 5px solid transparent; border-bottom: 7px solid currentColor; }
    .tri-down { border-left: 5px solid transparent; border-right: 5px solid transparent; border-top: 7px solid currentColor; }
    /* Image picker: file upload + web-search grid */
    .imgpick-toggle { margin-top: 8px; background: var(--panel-2); color: var(--text);
                      border: 1px solid var(--line); border-radius: 8px; padding: 7px 12px;
                      font: inherit; font-size: 13px; cursor: pointer; }
    .search-panel { margin-top: 10px; }
    .search-row { display: flex; gap: 8px; }
    .search-row input { flex: 1; }
    .search-go { background: var(--accent); color: var(--accent-ink); border: 0; border-radius: 8px;
                 padding: 0 16px; font: inherit; font-weight: 600; cursor: pointer; }
    /* Masonry columns so each result keeps its natural aspect ratio (like Google Images) */
    .search-grid { column-count: 3; column-gap: 6px; margin-top: 10px; }
    .search-grid img { width: 100%; height: auto; display: block; margin: 0 0 6px; border-radius: 8px;
                       cursor: pointer; border: 2px solid transparent; background: var(--panel-2); break-inside: avoid; }
    .search-grid img[aria-selected=true] { border-color: var(--accent); }
    .search-opts { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-top: 10px; }
    .search-count { background: var(--panel-2); color: var(--text); border: 1px solid var(--line);
                    border-radius: 8px; padding: 6px 8px; font: inherit; font-size: 12px; }
    .search-opt { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); cursor: pointer; user-select: none; }
    .search-opt input { accent-color: var(--accent); margin: 0; }
    /* :not(.hidden) so the base display doesn't override the shared .hidden utility */
    .search-pager { align-items: center; justify-content: center; gap: 12px; margin-top: 10px; }
    .search-pager:not(.hidden) { display: flex; }
    .pager-btn { background: var(--panel-2); color: var(--text); border: 1px solid var(--line);
                 border-radius: 8px; padding: 5px 12px; font: inherit; font-size: 13px; cursor: pointer; }
    .pager-btn:disabled { opacity: .4; cursor: default; }
    .pager-label { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
    .search-msg { font-size: 12px; color: var(--muted); margin-top: 8px; }
    /* :not(.hidden) so the base display doesn't override the shared .hidden utility */
    .imgpick-chosen { align-items: center; gap: 8px; margin-top: 8px; font-size: 13px; color: var(--muted); }
    .imgpick-chosen:not(.hidden) { display: flex; }
    .imgpick-chosen img { width: 44px; height: 44px; object-fit: cover; border-radius: 8px; border: 1px solid var(--line); }
    .imgpick-chosen button { background: transparent; color: var(--accent); border: 0; font: inherit; cursor: pointer; margin-left: auto; }
    /* Photo effects toggle grid */
    .fx-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; }
    .fx-toggle { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text);
                 cursor: pointer; user-select: none; margin: 0; padding: 6px 0; }
    .fx-toggle input { accent-color: var(--accent); margin: 0; }

    /* Photo effects — collapsible accordion at the bottom */
    .fx-card > .fx-header { display: flex; align-items: center; justify-content: space-between;
                            cursor: pointer; user-select: none; padding: 4px 0; }
    .fx-card > .fx-header > label { margin: 0; }
    .fx-card > .fx-header .fx-chev { color: var(--muted); font-size: 12px; transition: transform 120ms; }
    .fx-card.fx-open > .fx-header .fx-chev { transform: rotate(90deg); }
    .fx-card > .fx-body { display: none; margin-top: 10px; }
    .fx-card.fx-open > .fx-body { display: block; }

    .fx-list { display: flex; flex-direction: column; gap: 4px; }
    .fx-row { border: 1px solid var(--line); border-radius: 10px; background: var(--panel-2); overflow: hidden; }
    .fx-row-head { display: flex; align-items: center; gap: 10px; padding: 10px 12px; cursor: pointer; user-select: none; }
    .fx-row-head input[type=checkbox] { accent-color: var(--accent); margin: 0; }
    .fx-row-head .fx-name { flex: 1; font-size: 13px; color: var(--text); }
    .fx-row-head .fx-chev { color: var(--muted); font-size: 11px; transition: transform 120ms; }
    .fx-row.fx-open .fx-row-head .fx-chev { transform: rotate(90deg); }
    .fx-row-body { display: none; padding: 0 12px 12px; border-top: 1px solid var(--line);
                   background: var(--panel); }
    .fx-row.fx-open .fx-row-body { display: block; }
    .fx-params { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 14px; margin-top: 10px; }
    .fx-param { display: flex; flex-direction: column; gap: 4px; }
    .fx-param > label { font-size: 12px; color: var(--muted); margin: 0; display: flex;
                        justify-content: space-between; align-items: center; }
    .fx-param > label > .fx-val { color: var(--text); font-variant-numeric: tabular-nums; font-size: 11px; }
    .fx-param input[type=range] { accent-color: var(--accent); width: 100%; }
    .fx-param input[type=color] { width: 100%; height: 32px; border: 1px solid var(--line); border-radius: 6px;
                                  background: var(--panel-2); padding: 2px; cursor: pointer; }
    .fx-param select { width: 100%; background: var(--panel-2); color: var(--text);
                       border: 1px solid var(--line); border-radius: 8px; padding: 6px 8px; font: inherit; }
    .fx-param.fx-full { grid-column: 1 / -1; }
    .fx-reset { background: transparent; color: var(--muted); border: 0; font-size: 11px; padding: 6px 0;
                cursor: pointer; text-align: left; }
    .fx-reset:hover { color: var(--text); }
    .actions { display: flex; gap: 10px; margin-top: 4px; }
    button.primary { flex: 1; }
    .preview { margin-top: 14px; text-align: center; }
    .preview img { max-width: 100%; border-radius: var(--radius); border: 1px solid var(--line); display: none; }
  </style>
</head>
<body>
  <nav id="nav"></nav>
  <div class="wrap">
    <header>
      <h1>Create a post</h1>
    </header>

    <div class="card">
      <label for="templatePicker">Template</label>
      <select id="templatePicker" aria-label="Template"></select>
    </div>

    <div id="form"></div>

    <div class="actions">
      <button id="generate" class="primary" disabled>Generate</button>
      <button id="download" class="ghost hidden">Save</button>
      <button id="share" class="ghost hidden">Share</button>
    </div>
    <div id="statusBar" class="status-bar">
      <span id="status" class="status-text">Starting</span>
      <button id="retry" class="retry-btn hidden" type="button">Retry</button>
    </div>
    <p class="hint">Leave an image empty to keep the template's default.</p>

    <div class="preview"><img id="preview" alt="Rendered card" /></div>
  </div>

  <script type="module" src="/web/create.js"></script>
</body>
</html>
