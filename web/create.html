<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Create a post · Card Maker</title>
  <link rel="stylesheet" href="/web/ui/theme.css" />
  <style>
    /* Card-maker-specific styling. Shared tokens/primitives live in theme.css. */
    header { display: flex; align-items: baseline; justify-content: space-between; margin: 4px 0 14px; }
    h1 { font-size: 18px; margin: 0; font-weight: 600; }
    #status { font-size: 12px; color: var(--muted); }
    .row { display: flex; align-items: center; gap: 12px; }
    input[type=range] { flex: 1; accent-color: var(--accent); }
    .pill { font-variant-numeric: tabular-nums; font-size: 13px; color: var(--text); background: var(--panel-2);
            border: 1px solid var(--line); border-radius: 999px; padding: 3px 10px; white-space: nowrap; }
    .seg { display: inline-flex; flex-wrap: wrap; background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
    .seg button { background: transparent; color: var(--muted); border: 0; padding: 8px 16px; font: inherit; cursor: pointer; }
    .seg button[aria-pressed=true] { background: var(--accent); color: var(--accent-ink); font-weight: 600; }
    input[type=file] { width: 100%; font-size: 13px; color: var(--muted); }
    .nudge { display: flex; align-items: center; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .nudge-label { font-size: 12px; color: var(--muted); margin-right: 2px; }
    .nudge-btn { background: var(--panel-2); color: var(--text); border: 1px solid var(--line);
                 border-radius: 8px; padding: 6px 11px; font: inherit; font-size: 14px; line-height: 1; cursor: pointer; }
    .nudge-btn:active { transform: scale(0.94); }
    /* Image picker: file upload + web-search grid */
    .imgpick-toggle { margin-top: 8px; background: var(--panel-2); color: var(--text);
                      border: 1px solid var(--line); border-radius: 8px; padding: 7px 12px;
                      font: inherit; font-size: 13px; cursor: pointer; }
    .search-panel { margin-top: 10px; }
    .search-row { display: flex; gap: 8px; }
    .search-row input { flex: 1; }
    .search-go { background: var(--accent); color: var(--accent-ink); border: 0; border-radius: 8px;
                 padding: 0 16px; font: inherit; font-weight: 600; cursor: pointer; }
    /* Masonry columns so each result keeps its natural aspect ratio (like Google Images) */
    .search-grid { column-count: 3; column-gap: 6px; margin-top: 10px; }
    .search-grid img { width: 100%; height: auto; display: block; margin: 0 0 6px; border-radius: 8px;
                       cursor: pointer; border: 2px solid transparent; background: var(--panel-2); break-inside: avoid; }
    .search-grid img[aria-selected=true] { border-color: var(--accent); }
    .search-opts { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-top: 10px; }
    .search-count { background: var(--panel-2); color: var(--text); border: 1px solid var(--line);
                    border-radius: 8px; padding: 6px 8px; font: inherit; font-size: 12px; }
    .search-opt { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); cursor: pointer; user-select: none; }
    .search-opt input { accent-color: var(--accent); margin: 0; }
    /* :not(.hidden) so the base display doesn't override the shared .hidden utility */
    .search-pager { align-items: center; justify-content: center; gap: 12px; margin-top: 10px; }
    .search-pager:not(.hidden) { display: flex; }
    .pager-btn { background: var(--panel-2); color: var(--text); border: 1px solid var(--line);
                 border-radius: 8px; padding: 5px 12px; font: inherit; font-size: 13px; cursor: pointer; }
    .pager-btn:disabled { opacity: .4; cursor: default; }
    .pager-label { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
    .search-msg { font-size: 12px; color: var(--muted); margin-top: 8px; }
    /* :not(.hidden) so the base display doesn't override the shared .hidden utility */
    .imgpick-chosen { align-items: center; gap: 8px; margin-top: 8px; font-size: 13px; color: var(--muted); }
    .imgpick-chosen:not(.hidden) { display: flex; }
    .imgpick-chosen img { width: 44px; height: 44px; object-fit: cover; border-radius: 8px; border: 1px solid var(--line); }
    .imgpick-chosen button { background: transparent; color: var(--accent); border: 0; font: inherit; cursor: pointer; margin-left: auto; }
    .actions { display: flex; gap: 10px; margin-top: 4px; }
    button.primary { flex: 1; }
    .preview { margin-top: 14px; text-align: center; }
    .preview img { max-width: 100%; border-radius: var(--radius); border: 1px solid var(--line); display: none; }
  </style>
</head>
<body>
  <nav id="nav"></nav>
  <div class="wrap">
    <header>
      <h1>Create a post</h1>
      <span id="status">starting…</span>
    </header>

    <div class="card">
      <label>Template</label>
      <div class="seg" id="templatePicker" role="group" aria-label="Template"></div>
    </div>

    <div id="form"></div>

    <div class="actions">
      <button id="generate" class="primary" disabled>Generate</button>
      <button id="download" class="ghost hidden">Save</button>
      <button id="share" class="ghost hidden">Share</button>
    </div>
    <p class="hint">Leave an image empty to keep the template's default.</p>

    <div class="preview"><img id="preview" alt="Rendered card" /></div>
  </div>

  <script type="module" src="/web/create.js"></script>
</body>
</html>
