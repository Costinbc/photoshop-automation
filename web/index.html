<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Card Maker</title>
  <link rel="stylesheet" href="/web/ui/theme.css" />
  <style>
    /* Landing-specific styling. Shared tokens/primitives live in theme.css. */
    .hero { text-align: center; padding: 28px 0 8px; }
    .hero h1 { font-size: 26px; margin: 0 0 8px; font-weight: 700; }
    .hero p { color: var(--muted); margin: 0; font-size: 15px; }
    .actions { display: grid; gap: 12px; margin-top: 24px; }
    a.action { display: flex; align-items: center; gap: 14px; text-decoration: none;
               background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
               padding: 16px; color: var(--text); }
    a.action:hover { border-color: var(--accent); }
    .action-body { flex: 1; }
    .action-title { font-weight: 600; font-size: 16px; }
    .action-sub { color: var(--muted); font-size: 13px; margin-top: 2px; }
    /* Right-pointing chevron drawn in CSS (no glyph). */
    .action-arrow { flex: none; width: 9px; height: 9px; margin-right: 4px;
                    border-right: 2px solid var(--muted); border-top: 2px solid var(--muted); transform: rotate(45deg); }
    a.action:hover .action-arrow { border-color: var(--accent); }
  </style>
</head>
<body>
  <nav id="nav"></nav>
  <div class="wrap">
    <div class="hero">
      <h1>Card Maker</h1>
      <p>Basketball quote cards, tweet reposts, and trending headlines, built on any phone.</p>
    </div>

    <div class="actions">
      <a class="action" href="/web/create.html">
        <span class="action-body">
          <div class="action-title">Create a post</div>
          <div class="action-sub">Choose a template and fill in the details.</div>
        </span>
        <span class="action-arrow"></span>
      </a>
      <a class="action" href="/web/templates.html">
        <span class="action-body">
          <div class="action-title">Browse templates</div>
          <div class="action-sub">View the available templates.</div>
        </span>
        <span class="action-arrow"></span>
      </a>
      <a class="action" href="/web/prep.html">
        <span class="action-body">
          <div class="action-title">Upload a template</div>
          <div class="action-sub">Turn a PSD into a reusable template.</div>
        </span>
        <span class="action-arrow"></span>
      </a>
    </div>
  </div>

  <script type="module">
    import { mountNav } from "/web/ui/nav.js";
    mountNav(null);
  </script>
</body>
</html>
