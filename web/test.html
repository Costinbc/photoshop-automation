<!doctype html><html><head><meta charset="utf-8"><title>web balance test</title></head>
<body style="background:#111;color:#ddd">
<p id="log">Starting</p><img id="out" style="max-width:360px">
<script type="module">
import { RenderSession } from "./session.js";
const log=m=>document.getElementById("log").textContent=m;
const s=new RenderSession({base:".."});
const req={template:"quote_big_template",quote:"it felt like an underdog to me.",caption:"balanced wrap in the browser",mode:"single",images:{main:"assets/test_square.jpg"}};
try{const png=await s.render(req,log);document.getElementById("out").src=URL.createObjectURL(new Blob([png],{type:"image/png"}));log("DONE");window.__done=true;}
catch(e){log("ERR "+e.message);window.__error=e.message;}
</script></body></html>
